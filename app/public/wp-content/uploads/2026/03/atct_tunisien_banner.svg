    <line x1="4" y1="50" x2="96" y2="50" stroke="#4A90C4" stroke-width="1" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(74, 144, 196);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="12" y1="26" x2="88" y2="26" stroke="#4A90C4" stroke-width="0.8" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(74, 144, 196);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="12" y1="74" x2="88" y2="74" stroke="#4A90C4" stroke-width="0.8" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(74, 144, 196);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Arrow going out of globe -->
    <path d="M78 28 L98 14 M88 14 L98 14 L98 24" fill="none" stroke="#F5A623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" style="fill:none;stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:round;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="50" cy="50" r="6" fill="#C1272D" opacity="0.8" style="fill:rgb(193, 39, 45);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- ATCT badge -->
  <rect x="200" y="32" width="100" height="34" rx="8" fill="#C1272D" style="fill:rgb(193, 39, 45);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="250" y="55" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="700" letter-spacing="2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:auto">ATCT</text>

  <!-- Main Arabic title (Tunisian dialect) -->
  <text x="200" y="112" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="700" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:28px;font-weight:700;text-anchor:start;dominant-baseline:auto">&#x634;&#x646;&#x648;&#x651;&#x629; &#x647;&#x64A; ATCT</text>
  <text x="200" y="155" fill="#F5A623" font-family="sans-serif" font-size="22" font-weight="700" style="fill:rgb(245, 166, 35);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:22px;font-weight:700;text-anchor:start;dominant-baseline:auto">&#x648;&#x643;&#x64A;&#x641;&#x627;&#x634; &#x62A;&#x646;&#x62C;&#x645; &#x62A;&#x62E;&#x62F;&#x645; &#x627;&#x644;&#x628;&#x631;&#x627;&#x61F;</text>

  <!-- Subtitle in French -->
  <text x="200" y="192" fill="#8AB4D4" font-family="sans-serif" font-size="13" style="fill:rgb(138, 180, 212);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">C'est quoi l'ATCT et comment travailler &#xE0; l'&#xE9;tranger ?</text>

  <!-- Decorative line -->
  <line x1="200" y1="210" x2="500" y2="210" stroke="#C1272D" stroke-width="2" stroke-linecap="round" opacity="0.7" style="fill:rgb(0, 0, 0);stroke:rgb(193, 39, 45);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tags -->
  <rect x="200" y="225" width="96" height="26" rx="13" fill="#C1272D" opacity="0.25" style="fill:rgb(193, 39, 45);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="248" y="243" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="11" opacity="0.9" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">&#x62A;&#x634;&#x63A;&#x64A;&#x644; &#x628;&#x627;&#x644;&#x62E;&#x627;&#x631;&#x62C;</text>

  <rect x="306" y="225" width="80" height="26" rx="13" fill="#4A90C4" opacity="0.25" style="fill:rgb(74, 144, 196);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="346" y="243" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="11" opacity="0.9" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Emploi</text>

  <rect x="396" y="225" width="80" height="26" rx="13" fill="#F5A623" opacity="0.25" style="fill:rgb(245, 166, 35);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="436" y="243" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="11" opacity="0.9" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">&#x641;&#x631;&#x635; &#x639;&#x645;&#x644;</text>

  <!-- Bottom bar text -->
  <text x="340" y="289" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="11" opacity="0.7" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Agence Tunisienne de Coop&#xE9;ration Technique</text>
</svg>
